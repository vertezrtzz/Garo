<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garo Gallery</title>
    <link rel="icon" type="image/png" href="imgs/92960726f356572897835811cbfdb054.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d0d; color: #fff; font-family: sans-serif; background-image: url('92960726f356572897835811cbfdb054.png'); background-size: cover; background-attachment: fixed; }
        h1 { text-align: center; padding: 30px; color: #c084fc; font-size: 2rem; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px; 
            padding: 20px; 
        }
        .gallery img { 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>Garo Gallery 🖤</h1>
    <div class="gallery">
        <img src="imgs/9f3ceccf70ed52af8ff907c7b1268460.jpg">
        <img src="imgs/94c04bcd76522d430b0dece4a26d5819.jpg">
    </div>
</body>
</html>
