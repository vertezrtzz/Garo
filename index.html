<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex no Zatta na Korekushon</title>
    <link rel="icon" type="image/png" href="imgs/ac74d3100799ff594a509a0df73afab3.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0d0d0d; 
            color: #fff; 
            font-family: sans-serif;
        }
        body.drag-over::after {
            content: '';
            position: fixed;
            inset: 0;
            border: 4px dashed #c084fc;
            border-radius: 12px;
            pointer-events: none;
            z-index: 999;
        }
        h1 { text-align: center; padding: 30px; color: #c084fc; font-size: 2rem; }
        .upload-area {
            display: flex;
            justify-content: center;
            padding: 0 20px 20px;
        }
        .upload-btn {
            background: #c084fc;
            color: #0d0d0d;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .upload-btn:hover { background: #a855f7; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; 
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .gallery a {
            display: block;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 8px;
        }
        .gallery a img { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery a img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline id="bgvideo" style="position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0.6;">
        <source src="imgs/42de0fe46ec45cf0217905d5eff4eef9.webm" type="video/webm">
    </video>
    <button id="soundbtn" onclick="toggleSound()" style="position:fixed;bottom:20px;right:20px;background:#c084fc;border:none;border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;z-index:100;">🔇</button>

    <h1 style="position:relative;z-index:1;">⋈Vertex no Zatta na Korekushon⋈</h1>

    <div class="upload-area">
        <button class="upload-btn" onclick="uploadImage()">+</button>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
        const CLOUD_NAME = 'dxmzbw0ju';
        const UPLOAD_PRESET = 'vertexito';

        async function loadImages() {
            const res = await fetch(`https://res.cloudinary.com/${CLOUD_NAME}/image/list/vertex.json`);
            const data = await res.json();
            if (data.resources) {
                data.resources.forEach(img => {
                    const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}.${img.format}`;
                    addImage(url);
                });
            }
        }

        window.onload = loadImages;

        function uploadImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = async (e) => {
                const files = Array.from(e.target.files);
                for (const file of files) {
                    const url = await uploadToCloudinary(file);
                    if (url) addImage(url);
                }
            };
            input.click();
        }

        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('drag-over');
        });
        document.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null) document.body.classList.remove('drag-over');
        });
        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            document.body.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            for (const file of files) {
                const url = await uploadToCloudinary(file);
                if (url) addImage(url);
            }
        });

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            return data.secure_url;
        }

        function addImage(url) {
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            const img = document.createElement('img');
            img.src = url;
            a.appendChild(img);
            document.getElementById('gallery').appendChild(a);
        }

        function toggleSound() {
            const v = document.getElementById('bgvideo');
            const b = document.getElementById('soundbtn');
            v.muted = !v.muted;
            b.textContent = v.muted ? '🔇' : '🔊';
        }
    </script>
</body>
</html>
