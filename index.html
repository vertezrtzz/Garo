<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garo Gallery</title>
    <link rel="icon" type="image/png" href="imgs/ac74d3100799ff594a509a0df73afab3.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0d0d0d; 
            background-image: url('imgs/ezgif-5cc80d9ba6e822b4.png'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            color: #fff; 
            font-family: sans-serif; 
        }
        h1 { text-align: center; padding: 30px; color: #c084fc; font-size: 2rem; }

        .upload-area {
            display: flex;
            justify-content: center;
            padding: 10px 20px 20px;
        }
        .upload-btn {
            background: #c084fc;
            color: #0d0d0d;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-btn:hover { background: #a855f7; }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px; 
            padding: 20px; 
        }
        .gallery img { 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>Garo Gallery 🖤</h1>

    <div class="upload-area">
        <button class="upload-btn" onclick="uploadImage()">+ Subir imagen</button>
    </div>

    <div class="gallery" id="gallery">
        <img src="imgs/9f3ceccf70ed52af8ff907c7b1268460.jpg">
        <img src="imgs/94c04bcd76522d430b0dece4a26d5819.jpg">
    </div>

    <script>
        const CLOUD_NAME = 'dxmzbw0ju';
        const UPLOAD_PRESET = 'vertexito';

        // Cargar imágenes guardadas al abrir la página
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('garoGallery') || '[]');
            saved.forEach(url => addImage(url));
        };

        function uploadImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = async (e) => {
                const files = Array.from(e.target.files);
                for (const file of files) {
                    const url = await uploadToCloudinary(file);
                    if (url) {
                        addImage(url);
                        saveImage(url);
                    }
                }
            };
            input.click();
        }

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            return data.secure_url;
        }

        function addImage(url) {
            const img = document.createElement('img');
            img.src = url;
            img.borderRadius = '8px';
            document.getElementById('gallery').appendChild(img);
        }

        function saveImage(url) {
            const saved = JSON.parse(localStorage.getItem('garoGallery') || '[]');
            saved.push(url);
            localStorage.setItem('garoGallery', JSON.stringify(saved));
        }
    </script>
</body>
</html>
